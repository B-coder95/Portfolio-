<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Me</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#7c3aed);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

nav{
    text-align:center;
    padding:20px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
    font-weight:500;
}

nav a:hover{
    color:#93c5fd;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

.title{
    text-align:center;
    color:white;
    font-size:48px;
    margin:30px 0;
}

.contact-wrapper{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.contact-info,
.contact-form{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:20px;

    padding:30px;
}

.contact-info h2,
.contact-form h2{
    color:white;
    margin-bottom:25px;
}

.info-box{
    margin-bottom:25px;
}

.info-box h3{
    color:#93c5fd;
    margin-bottom:5px;
}

.info-box p{
    color:white;
}

.social-links{
    margin-top:30px;
}

.social-links a{
    display:inline-block;
    text-decoration:none;
    color:white;
    border:1px solid rgba(255,255,255,0.3);
    padding:10px 18px;
    margin:5px;
    border-radius:30px;
    transition:0.3s;
}

.social-links a:hover{
    background:white;
    color:#111827;
}

form input,
form textarea{

    width:100%;
    padding:14px;

    margin-bottom:15px;

    border:none;

    outline:none;

    border-radius:10px;
}

form textarea{
    resize:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
}

.footer{
    text-align:center;
    color:white;
    padding:30px;
    margin-top:20px;
}

@media(max-width:768px){

    .contact-wrapper{
        grid-template-columns:1fr;
    }

    .title{
        font-size:36px;
    }

    nav a{
        display:block;
        margin:10px;
    }
}

</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="skills.html">Skills</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

    <h1 class="title">Get In Touch</h1>

    <div class="contact-wrapper">

        <div class="contact-info">

            <h2>Contact Information</h2>

            <div class="info-box">
                <h3>Name</h3>
                <p>Basant Kumar Mahto</p>
            </div>

            <div class="info-box">
                <h3>Email</h3>
                <p>yourmail@gmail.com</p>
            </div>

            <div class="info-box">
                <h3>Phone</h3>
                <p>+91 XXXXX XXXXX</p>
            </div>

            <div class="info-box">
                <h3>Location</h3>
                <p>Jharkhand, India</p>
            </div>

            <div class="social-links">
                <a href="#">LinkedIn</a>
                <a href="#">GitHub</a>
                <a href="#">Google Scholar</a>
            </div>

        </div>

        <div class="contact-form">

            <h2>Send Message</h2>

            <form>

                <input type="text"
                placeholder="Your Name" required>

                <input type="email"
                placeholder="Your Email" required>

                <input type="text"
                placeholder="Subject">

                <textarea rows="6"
                placeholder="Write your message here..."></textarea>

                <button type="submit">
                    Send Message
                </button>

            </form>

        </div>

    </div>

</div>

<div class="footer">
    © 2026 Basant Kumar Mahto | Portfolio Website
</div>

</body>
</html>
